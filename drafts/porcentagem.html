<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progresso do Trajeto</title>
<style>
  :root {
    --primary: #00bfff;
    --secondary: #1e90ff;
    --bg: #0d1117;
    --card-bg: #161b22;
    --text: #e6edf3;
    --accent: #30363d;
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Inter", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    margin: 0;
  }

  .container {
    background: var(--card-bg);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 25px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 25px rgba(0, 191, 255, 0.1);
  }

  h1 {
    text-align: center;
    color: var(--primary);
    margin-bottom: 25px;
    font-size: 1.6rem;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  label {
    font-weight: 500;
    color: #a9b1bb;
  }

  input {
    padding: 12px;
    border: 1px solid var(--accent);
    border-radius: 10px;
    background: #0b0f13;
    color: var(--text);
    font-size: 1rem;
  }

  button {
    margin-top: 10px;
    padding: 12px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.3s;
  }

  button:hover {
    transform: scale(1.03);
    opacity: 0.9;
  }

  .progress-container {
    width: 100%;
    background: #1c2128;
    border-radius: 15px;
    overflow: hidden;
    height: 28px;
    margin-top: 25px;
    border: 1px solid var(--accent);
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    box-shadow: 0 0 10px var(--primary);
    text-align: center;
    line-height: 28px;
    color: #fff;
    font-weight: 600;
    transition: width 0.5s ease;
  }

  .info {
    text-align: center;
    margin-top: 15px;
    font-size: 1rem;
    color: #9ba5b1;
  }

  @media (max-width: 480px) {
    .container {
      padding: 20px;
      border-radius: 15px;
    }
    h1 {
      font-size: 1.4rem;
    }
    input, button {
      font-size: 0.95rem;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Progresso do Trajeto</h1>

    <div class="input-group">
      <label>Hora de Partida</label>
      <input type="time" id="startTime">

      <label>Hora de Chegada Esperada</label>
      <input type="time" id="endTime">

      <button onclick="startProgress()">Iniciar</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="info" id="infoText">Aguardando início...</div>
  </div>

  <script>
    let interval;

    function startProgress() {
      clearInterval(interval);

      const start = document.getElementById('startTime').value;
      const end = document.getElementById('endTime').value;

      if (!start || !end) {
        alert("Por favor, preencha os dois horários.");
        return;
      }

      const [startH, startM] = start.split(':').map(Number);
      const [endH, endM] = end.split(':').map(Number);

      const now = new Date();
      const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startH, startM);
      const endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), endH, endM);

      // Caso a chegada seja no dia seguinte
      if (endTime < startTime) {
        endTime.setDate(endTime.getDate() + 1);
      }

      interval = setInterval(() => {
        const current = new Date();
        let percent = ((current - startTime) / (endTime - startTime)) * 100;

        if (percent < 0) percent = 0;
        if (percent > 100) percent = 100;

        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = percent.toFixed(2) + '%';
        progressBar.textContent = percent.toFixed(0) + '%';

        const remaining = endTime - current;
        const remainingHours = Math.floor(remaining / (1000 * 60 * 60));
        const remainingMinutes = Math.floor((remaining / (1000 * 60)) % 60);

        const infoText = document.getElementById('infoText');
        if (percent >= 100) {
          infoText.textContent = "Trajeto concluído! 🏁";
          clearInterval(interval);
        } else {
          infoText.textContent = `Faltam ${remainingHours}h ${remainingMinutes}min para a chegada.`;
        }
      }, 1000);
    }
  </script>
</body>
</html>
